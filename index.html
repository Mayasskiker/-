<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برا السالفة PRO - النسخة الاحترافية</title>
    <style>
        :root {
            --accent: #00d2ff;
            --main-bg: #0f2027;
            --card-grad: linear-gradient(145deg, #2c3e50, #000000);
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f2027;
            background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--accent); text-shadow: 0 0 20px rgba(0,210,255,0.4); }

        .player-chip {
            display: inline-block;
            background: rgba(0, 210, 255, 0.2);
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 50px;
            margin: 5px;
            font-size: 0.9rem;
            animation: pop 0.3s ease;
        }

        .game-card {
            background: var(--card-grad);
            padding: 80px 20px;
            border-radius: 25px;
            margin: 30px 0;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.4s ease;
            position: relative;
        }

        .game-card:hover { transform: scale(1.02); border-color: var(--accent); }

        .role-text { font-size: 1.8rem; font-weight: bold; }
        .hint-text { display: block; font-size: 1rem; color: #888; margin-top: 15px; }

        input {
            width: 70%;
            padding: 15px;
            border-radius: 15px 0 0 15px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            font-size: 1rem;
        }

        button {
            padding: 15px 25px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: var(--accent);
            color: #000;
            transition: 0.3s;
            font-size: 1rem;
        }
        
        button:hover { opacity: 0.8; }

        #add-btn { border-radius: 0 15px 15px 0; }
        .start-btn { width: 100%; margin-top: 20px; background: #fff; }

        .hidden { display: none !important; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container" id="setup-screen">
    <h1>برا السالفة 🤐</h1>
    <p style="opacity: 0.7;">أدخل أسماء المحققين (3 على الأقل)</p>
    <div style="display: flex; justify-content: center; margin-bottom: 20px;">
        <input type="text" id="player-name" placeholder="اسم اللاعب..." onkeypress="handleKeyPress(event)">
        <button id="add-btn" onclick="addPlayer()">إضافة</button>
    </div>
    <div id="player-list"></div>
    <button id="start-btn" class="start-btn hidden" onclick="startGame()">تحضير السالفة 🚀</button>
</div>

<div class="container hidden" id="game-screen">
    <h3 id="turn-title" style="color: var(--accent);"></h3>
    <div class="game-card" id="role-card" onclick="revealRole()">
        <span class="role-text" id="main-role-text">إكشف كرتك</span>
        <span class="hint-text" id="hint-text">تأكد أن لا أحد يراقبك</span>
    </div>
    <button id="next-btn" class="start-btn hidden" onclick="nextPlayer()">اللاعب التالي ⬅️</button>
</div>

<script>
    const database = [
        {item: "مستشفى", cat: "مكان عام"}, {item: "مدرسة", cat: "مكان عام"}, {item: "مطار", cat: "مكان سفر"},
        {item: "مطعم بخاري", cat: "مكان أكل"}, {item: "نادي رياضي", cat: "مكان نشاط"}, {item: "سينما", cat: "مكان ترفيه"},
        {item: "مخيم في البر", cat: "مكان رحلات"}, {item: "مكة", cat: "مدينة"}, {item: "المرّيخ", cat: "كوكب"},
        {item: "تحت البحر", cat: "مكان طبيعي"}, {item: "سيرك", cat: "مكان ترفيه"}, {item: "صيدلية", cat: "مكان صحي"},
        {item: "صالون حلاقة", cat: "مكان خدمات"}, {item: "فندق", cat: "مكان إقامة"}, {item: "عرس", cat: "مناسبة"},
        {item: "سجن", cat: "مكان حكومي"}, {item: "كبسة", cat: "أكلة"}, {item: "شاورما", cat: "أكلة سريعة"},
        {item: "بيتزا", cat: "أكلة عالمية"}, {item: "سوشي", cat: "أكلة بحرية"}, {item: "برجر", cat: "أكلة سريعة"},
        {item: "ورق عنب", cat: "مقبلات"}, {item: "قهوة سعودية", cat: "مشروب"}, {item: "شاي", cat: "مشروب"},
        {item: "ساعة يد", cat: "شيء يُلبس"}, {item: "نظارة", cat: "إكسسوار"}, {item: "كاميرا", cat: "جهاز إلكتروني"},
        {item: "جوال", cat: "جهاز إلكتروني"}, {item: "مفتاح", cat: "جماد"}, {item: "عطر", cat: "جماد"},
        {item: "طيار", cat: "مهنة"}, {item: "طبيب أسنان", cat: "مهنة"}, {item: "مهندس", cat: "مهنة"},
        {item: "يوتيوبر", cat: "مهنة حديثة"}, {item: "بلاستيشن", cat: "تسلية"}, {item: "تيك توك", cat: "تطبيق"},
        {item: "سناب شات", cat: "تواصل"}, {item: "اختبارات", cat: "شيء مكروه"}, {item: "عيد الفطر", cat: "مناسبة"},
        {item: "مسبح", cat: "مكان رياضي"}, {item: "مكتبة", cat: "مكان هادئ"}, {item: "غابة", cat: "طبيعة"},
        {item: "منطاد", cat: "وسيلة نقل"}, {item: "دراجة", cat: "وسيلة نقل"}, {item: "فرن", cat: "أداة مطبخ"},
        {item: "الثلج", cat: "طقس"}, {item: "العواصف", cat: "طقس"}, {item: "الأهرامات", cat: "معلم سياحي"},
        {item: "برج إيفل", cat: "معلم سياحي"}, {item: "الأسد", cat: "حيوان"}, {item: "الزرافة", cat: "حيوان"},
        {item: "كرة القدم", cat: "رياضة"}, {item: "التنس", cat: "رياضة"}, {item: "مظلة", cat: "شيء للحماية"}
    ];

    let players = [];
    let outPlayer = "";
    let selectedEntry = {};
    let currentIndex = 0;
    let revealed = false;

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            addPlayer();
        }
    }

    function addPlayer() {
        const input = document.getElementById("player-name");
        const name = input.value.trim();
        
        if (name === "") {
            alert("الرجاء كتابة اسم اللاعب!");
            return;
        }
        if (players.includes(name)) {
            alert("الاسم موجود مسبقاً، اختر اسماً آخر!");
            return;
        }

        players.push(name);
        const chip = document.createElement("div");
        chip.className = "player-chip";
        chip.innerText = name;
        document.getElementById("player-list").appendChild(chip);
        
        input.value = "";
        input.focus();

        if (players.length >= 3) {
            document.getElementById("start-btn").classList.remove("hidden");
        }
    }

    function startGame() {
        selectedEntry = database[Math.floor(Math.random() * database.length)];
        outPlayer = players[Math.floor(Math.random() * players.length)];
        currentIndex = 0;
        document.getElementById("setup-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");
        showTurn();
    }

    function showTurn() {
        revealed = false;
        document.getElementById("turn-title").innerText = `دور اللاعب: ${players[currentIndex]}`;
        document.getElementById("main-role-text").innerText = "إكشف كرتك";
        document.getElementById("hint-text").innerText = "إضغط لعرض السالفة";
        document.getElementById("next-btn").classList.add("hidden");
        document.getElementById("role-card").style.borderColor = "transparent";
    }

    function revealRole() {
        if (revealed) return;
        const mainText = document.getElementById("main-role-text");
        const hintText = document.getElementById("hint-text");
        
        if (players[currentIndex] === outPlayer) {
            mainText.innerText = "أنت برا السالفة! 🤫";
            hintText.innerText = `تلميح: السالفة عن (${selectedEntry.cat})`;
            document.getElementById("role-card").style.borderColor = "#ff4757"; 
        } else {
            mainText.innerText = selectedEntry.item;
            hintText.innerText = `التصنيف: ${selectedEntry.cat}`;
            document.getElementById("role-card").style.borderColor = "var(--accent)"; 
        }
        
        revealed = true;
        document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextPlayer() {
        currentIndex++;
        if (currentIndex < players.length) {
            showTurn();
        } else {
            alert("اكتمل التوزيع! ابدأوا الأسئلة الآن.");
            if(confirm("هل تريدون اللعب جولة جديدة بنفس اللاعبين؟")) {
                startGame();
            } else {
                location.reload();
            }
        }
    }
</script>

</body>
</html>
